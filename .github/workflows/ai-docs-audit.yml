name: AI Docs Audit

on:
  schedule:
    # Weekly on Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect merged PRs from the past week
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SINCE=$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
              || date -u -v-7d '+%Y-%m-%dT%H:%M:%SZ')

          echo "Collecting PRs merged since $SINCE ..."

          # Get merged PRs with titles, numbers, changed files
          gh pr list \
            --state merged \
            --search "merged:>=${SINCE}" \
            --json number,title,mergedAt,changedFiles,files \
            --limit 50 \
            --jq '.' > merged_prs.json

          PR_COUNT=$(jq length merged_prs.json)
          echo "Found $PR_COUNT merged PR(s)"
          echo "pr_count=$PR_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$PR_COUNT" -eq 0 ]; then
            echo "No PRs merged in the past week. Skipping."
            exit 0
          fi

          # Build a markdown summary of merged PRs
          {
            echo "## Merged PRs (past 7 days)"
            echo ""
            jq -r '.[] | "- **#\(.number)** \(.title) (merged \(.mergedAt))"' merged_prs.json
            echo ""
            echo "## Changed files"
            echo ""
            echo '```'
            jq -r '.[].files[].path' merged_prs.json | sort -u
            echo '```'
          } > pr_summary.md

      - name: Create audit issue and assign to Copilot
        if: steps.collect.outputs.pr_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_SUMMARY=$(cat pr_summary.md)

          ISSUE_BODY=$(cat <<'DELIM'
          ## Weekly AI Docs Audit

          The following PRs were merged since the last audit. Review whether any
          AI configuration files need updating.

          DELIM
          )
          ISSUE_BODY="${ISSUE_BODY}

          ${PR_SUMMARY}

          ---

          ## AI config files to audit

          - \`AGENTS.md\`
          - \`.github/copilot-instructions.md\`
          - \`.github/instructions/devflow-architecture.instructions.md\`
          - \`.github/instructions/mcp-tools.instructions.md\`
          - \`.github/instructions/testing.instructions.md\`
          - \`.github/instructions/packaging.instructions.md\`

          ## Instructions

          Use the \`docs-keeper\` custom agent profile for guidance. For each merged PR,
          check if the changed files affect anything documented in the AI config files.
          If updates are needed, open a single PR with all changes. If nothing needs
          updating, close this issue with a comment explaining why.
          "

          # Create the issue
          ISSUE_URL=$(gh issue create \
            --title "Weekly AI Docs Audit — $(date -u '+%Y-%m-%d')" \
            --body "$ISSUE_BODY" \
            --label "ai-docs-audit")

          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "Created issue #$ISSUE_NUMBER"

          # Get Copilot bot ID and assign
          COPILOT_ID=$(gh api graphql -f query='
            query {
              repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                suggestedActors(capabilities: [CAN_BE_ASSIGNED], first: 100) {
                  nodes { login __typename ... on Bot { id } }
                }
              }
            }' --jq '.data.repository.suggestedActors.nodes[] | select(.login == "copilot-swe-agent") | .id' 2>/dev/null || true)

          if [ -z "$COPILOT_ID" ]; then
            echo "::warning::Copilot coding agent not available in this repository. Issue created but not assigned."
            exit 0
          fi

          ISSUE_NODE_ID=$(gh api graphql -f query='
            query {
              repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                issue(number: '"$ISSUE_NUMBER"') { id }
              }
            }' --jq '.data.repository.issue.id')

          REPO_NODE_ID=$(gh api graphql -f query='
            query {
              repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") { id }
            }' --jq '.data.repository.id')

          # Assign issue to Copilot with the docs-keeper custom agent
          gh api graphql -f query='
            mutation {
              updateIssue(input: {
                id: "'"$ISSUE_NODE_ID"'",
                assigneeIds: ["'"$COPILOT_ID"'"],
                agentAssignment: {
                  targetRepositoryId: "'"$REPO_NODE_ID"'",
                  baseRef: "main",
                  customAgent: "docs-keeper"
                }
              }) {
                issue { id title assignees(first: 5) { nodes { login } } }
              }
            }' -H 'GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection'

          echo "Assigned issue #$ISSUE_NUMBER to Copilot (docs-keeper agent)"
