name: skill-check

on:
  pull_request:
    paths:
      - 'plugins/**'
      - 'tests/**'
      - 'eng/allowed-external-deps.txt'
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'tests/**'
      - 'eng/allowed-external-deps.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download skill-validator
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download skill-validator-nightly \
            --repo dotnet/skills \
            --pattern "skill-validator-linux-x64.tar.gz" \
            --dir /tmp/skill-validator

          mkdir -p /tmp/skill-validator/bin
          tar -xzf /tmp/skill-validator/skill-validator-linux-x64.tar.gz \
            -C /tmp/skill-validator/bin
          chmod +x /tmp/skill-validator/bin/skill-validator

      - name: Run skill-validator check
        run: |
          plugin_args=$(for d in plugins/*/; do echo "--plugin $d"; done)
          /tmp/skill-validator/bin/skill-validator check \
            $plugin_args \
            --allowed-external-deps eng/allowed-external-deps.txt
