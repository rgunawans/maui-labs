name: CI - WPF

on:
  push:
    branches: [main]
    paths:
      - 'platforms/Windows.WPF/**'
      - 'eng/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'NuGet.config'
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]
    paths:
      - 'platforms/Windows.WPF/**'
      - 'eng/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'NuGet.config'

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      project-path: platforms/Windows.WPF/Windows.WPF.slnx
      project-name: wpf
      os: '["windows-latest"]'
      install-workloads: true
      run-tests: true
      pack: true
