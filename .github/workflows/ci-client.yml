name: CI - Client

on:
  push:
    branches: [main]
    paths:
      - 'src/Client/**'
      - 'eng/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'NuGet.config'
  pull_request:
    branches: [main]
    paths:
      - 'src/Client/**'
      - 'eng/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'NuGet.config'

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      project-path: src/Client/Client.slnf
      project-name: client
      run-tests: true
      pack: true
      install-workloads: false
