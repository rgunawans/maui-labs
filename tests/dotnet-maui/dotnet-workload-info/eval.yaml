scenarios:
  - name: "Discover Xcode requirement for .NET iOS workload"
    prompt: |
      I need to find out what Xcode version is required for the current .NET 10
      iOS workload. I don't want hardcoded values — show me how to query this
      from live NuGet APIs so I can script it in my CI pipeline.
    assertions:
      - type: "output_matches"
        pattern: "dotnet workload search version|workload search"
      - type: "output_matches"
        pattern: "v3-flatcontainer|api\\.nuget\\.org"
      - type: "output_matches"
        pattern: "WorkloadDependencies\\.json"
      - type: "output_matches"
        pattern: "Manifest-.*\\.0\\.100"
    rubric:
      - "Shows the multi-step chain: SDK version discovery → workload set → workload manifest → WorkloadDependencies.json"
      - "Uses the NuGet flat container API (v3-flatcontainer) to download nupkg files"
      - "Correctly builds the manifest package ID as Microsoft.NET.Sdk.iOS.Manifest-{sdkBand}"
      - "Extracts xcode version range from WorkloadDependencies.json and shows the recommended version"
      - "Does not hardcode any specific Xcode version numbers as the answer"
    timeout: 240

  - name: "Convert between CLI and NuGet workload set versions"
    prompt: |
      I'm writing a script that uses `dotnet workload search version`
      to get the workload set version, then needs to download the workload set
      package from NuGet. The CLI returns version "10.0.103". What's the NuGet
      package ID and version I need for the download URL?
    assertions:
      - type: "output_contains"
        value: "10.103.0"
      - type: "output_contains"
        value: "Microsoft.NET.Workloads.10.0.100"
      - type: "output_matches"
        pattern: "v3-flatcontainer/microsoft\\.net\\.workloads"
      - type: "output_matches"
        pattern: "workload search version"
    rubric:
      - "Correctly converts CLI version 10.0.103 to NuGet version 10.103.0"
      - "Derives the SDK band as 10.0.100 from the CLI version"
      - "Shows the complete NuGet download URL with lowercase package ID"
      - "Explains the conversion rule: CLI {major}.0.{patch} → NuGet {major}.{patch}.0"
    timeout: 240

  - name: "Find Android SDK packages from workload manifest"
    prompt: |
      My CI build script needs to install the exact Android SDK packages
      required by the .NET MAUI workload. I don't want to guess — how do
      I programmatically extract the list of required packages (build-tools
      version, platform API level, etc.) from the workload manifests?
    assertions:
      - type: "output_matches"
        pattern: "(?i)workloadset\\.json|workloads\\.workloadset"
      - type: "output_matches"
        pattern: "microsoft\\.net\\.sdk\\.android"
      - type: "output_matches"
        pattern: "build-tools|platforms;android"
      - type: "output_matches"
        pattern: "sdkmanager"
    rubric:
      - "Walks through downloading the workload set to find the Android manifest version and SDK band"
      - "Downloads the Android manifest package and extracts WorkloadDependencies.json"
      - "Shows the androidsdk.packages array with build-tools, platform-tools, platforms, and cmdline-tools"
      - "Provides a scriptable approach suitable for CI (curl/unzip or PowerShell equivalent)"
      - "Includes the sdkmanager install command using the extracted package list"
    timeout: 240

  - name: "Query latest MAUI NuGet package version from search API"
    prompt: |
      I want to check if there's a newer Microsoft.Maui.Controls NuGet package
      than what ships with the .NET 10 workload. How do I query the NuGet search
      API for the latest version, and how would I use a newer version in my project?
    assertions:
      - type: "output_contains"
        value: "azuresearch-usnc.nuget.org/query"
      - type: "output_matches"
        pattern: "packageid:Microsoft\\.Maui\\.Controls"
      - type: "output_matches"
        pattern: "<PackageReference"
    rubric:
      - "Uses the NuGet search API endpoint (azuresearch-usnc.nuget.org/query) with the packageid: filter"
      - "Shows how to filter results to the specific .NET major version"
      - "Explains the distinction between implicit (workload-bundled) and latest (out-of-band) versions"
      - "Shows adding an explicit PackageReference to override the implicit workload version"
    timeout: 240
