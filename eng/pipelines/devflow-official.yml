# Azure DevOps official build pipeline for DevFlow
# Uses Arcade build system with 1ES Pipeline Templates for security compliance.

trigger:
  batch: true
  branches:
    include:
    - main
    - release/*

pr: none

parameters:
- name: publishPackages
  displayName: 'Publish packages to feed'
  type: boolean
  default: true

variables:
- template: /eng/pipelines/common-variables.yml@self
- name: _BuildConfig
  value: Release
- name: PostBuildSign
  value: false

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: NetCore1ESPool-Internal
      image: windows.vs2026preview.scout.amd64
      os: windows
    # Required for publishing to external feeds like nuget.org
    settings:
      networkIsolationPolicy: Permissive

    stages:
    - stage: build
      displayName: Build
      jobs:
      - template: /eng/common/templates-official/jobs/jobs.yml@self
        parameters:
          enablePublishUsingPipelines: true
          enablePublishBuildArtifacts: true
          enablePublishTestResults: true
          testResultsFormat: xunit
          enableTelemetry: true
          jobs:
          - job: Windows
            pool:
              name: NetCore1ESPool-Internal
              demands: ImageOverride -equals windows.vs2026preview.scout.amd64
            strategy:
              matrix:
                Release:
                  _BuildConfig: Release
                  _OfficialBuildArgs: /p:DotNetSignType=test
                    /p:TeamName=$(_TeamName)
                    /p:DotNetPublishUsingPipelines=true
                    /p:OfficialBuildId=$(BUILD.BUILDNUMBER)
            steps:
            - task: UseDotNet@2
              displayName: Install .NET SDK
              inputs:
                useGlobalJson: true
            - script: dotnet workload install maui macos maui-tizen
              displayName: Install MAUI workloads
            - script: dotnet build -t:InstallAndroidDependencies -f net10.0-android -p:AndroidSdkDirectory="%ANDROID_HOME%" -p:AcceptAndroidSDKLicenses=true src\DevFlow\Microsoft.Maui.DevFlow.Agent\Microsoft.Maui.DevFlow.Agent.csproj
              displayName: Install Android SDK dependencies
            - script: eng\common\cibuild.cmd
                -configuration $(_BuildConfig)
                -prepareMachine
                -projects $(Build.SourcesDirectory)\src\DevFlow\DevFlow.slnf
                $(_OfficialBuildArgs)
              displayName: Build and Test
            - script: |
                echo "=== Diagnostics: WiX toolset package locations ==="
                echo.
                echo "--- .packages folder (repo-local) ---"
                if exist "$(Build.SourcesDirectory)\.packages\microsoft.wixtoolset.sdk" (
                  echo "Found .packages\microsoft.wixtoolset.sdk:"
                  dir /s /b "$(Build.SourcesDirectory)\.packages\microsoft.wixtoolset.sdk"
                ) else (
                  echo ".packages\microsoft.wixtoolset.sdk does NOT exist"
                )
                echo.
                if exist "$(Build.SourcesDirectory)\.packages\microsoft.signed.wix" (
                  echo "Found .packages\microsoft.signed.wix:"
                  dir /s /b "$(Build.SourcesDirectory)\.packages\microsoft.signed.wix"
                ) else (
                  echo ".packages\microsoft.signed.wix does NOT exist"
                )
                echo.
                echo "--- NuGet global cache ---"
                if exist "%USERPROFILE%\.nuget\packages\microsoft.wixtoolset.sdk" (
                  echo "Found in NuGet cache:"
                  dir /b "%USERPROFILE%\.nuget\packages\microsoft.wixtoolset.sdk"
                ) else (
                  echo "NOT in NuGet global cache"
                )
                echo.
                echo "--- .packages top-level contents ---"
                if exist "$(Build.SourcesDirectory)\.packages" (
                  dir /b "$(Build.SourcesDirectory)\.packages"
                ) else (
                  echo ".packages folder does NOT exist at all"
                )
                echo.
                echo "--- artifacts/packages ---"
                if exist "$(Build.SourcesDirectory)\artifacts\packages\Release\Shipping" (
                  dir /b "$(Build.SourcesDirectory)\artifacts\packages\Release\Shipping"
                ) else (
                  echo "No shipping packages found"
                )
              displayName: 'Diagnostics: WiX & package folder contents'
              condition: always()

    # - template: /eng/common/templates-official/post-build/post-build.yml@self
    #   parameters:
    #     enableSourceLinkValidation: false
    #     enableSigningValidation: true
    #     enableNugetValidation: true

    # Publish to NuGet.org using 1ES.PublishNuget task
    # Pattern from dotnet/aspire release-publish-nuget.yml:
    # - useDotNetTask: false (required - DotNetCoreCLI@2 doesn't support encrypted API keys)
    # - nuGetFeedType: external + publishFeedCredentials for NuGet.org
    - ${{ if eq(parameters.publishPackages, true) }}:
      - stage: publish_nuget
        displayName: 'Publish to NuGet.org'
        dependsOn:
        - Validate
        - publish_using_darc
        jobs:
        - job: PublishNuGet
          displayName: 'Push Packages to NuGet.org'
          timeoutInMinutes: 30
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2022.amd64
            os: windows
          templateContext:
            type: releaseJob
            isProduction: true
            inputs:
            - input: pipelineArtifact
              artifactName: PackageArtifacts
              targetPath: '$(Pipeline.Workspace)/PackageArtifacts'
          steps:
          - task: 1ES.PublishNuget@1
            displayName: 'Push Packages to NuGet.org'
            inputs:
              useDotNetTask: false
              packagesToPush: '$(Pipeline.Workspace)/PackageArtifacts/*.nupkg'
              packageParentPath: '$(Pipeline.Workspace)/PackageArtifacts'
              nuGetFeedType: external
              publishFeedCredentials: 'NuGet.org - dotnet/maui-labs' # TODO: Create this service connection in dnceng
