          timeoutInMinutes: 15
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: Publish AppProjectReference Packages
              targetPath: '$(Pipeline.Workspace)/AppProjectReferencePackages'
              artifactName: AppProjectReferencePackagesForNuGet
          steps:
          - download: current
            artifact: PackageArtifacts
            displayName: Download PackageArtifacts
          - powershell: |
              New-Item -ItemType Directory -Force -Path '$(Pipeline.Workspace)/AppProjectReferencePackages'
              Copy-Item '$(Pipeline.Workspace)/PackageArtifacts/Microsoft.Maui.Build.AppProjectReference.*.nupkg' '$(Pipeline.Workspace)/AppProjectReferencePackages/' -Verbose
            displayName: Filter AppProjectReference packages

        - job: PublishNuGet
          displayName: 'Push AppProjectReference to NuGet.org'
          dependsOn: PrepareArtifacts
          timeoutInMinutes: 30
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
          templateContext:
            type: releaseJob
            isProduction: true
            inputs:
            - input: pipelineArtifact
              artifactName: AppProjectReferencePackagesForNuGet
              targetPath: '$(Pipeline.Workspace)/AppProjectReferencePackages'
          steps:
          - task: 1ES.PublishNuget@1
            displayName: 'Push AppProjectReference to NuGet.org'
            inputs:
              useDotNetTask: false
              packagesToPush: '$(Pipeline.Workspace)/AppProjectReferencePackages/*.nupkg'
              packageParentPath: '$(Pipeline.Workspace)/AppProjectReferencePackages'
              nuGetFeedType: external
              publishFeedCredentials: 'nuget.org (dotnetframework)'

    # Publish Linux GTK4 packages to NuGet.org
    - ${{ if eq(parameters.publishLinuxGtk4Nuget, true) }}:
      - stage: publish_linux_gtk4_nuget
        displayName: 'Publish Linux GTK4 to NuGet.org'
        dependsOn:
        - Validate
        - publish_using_darc
        jobs:
        - job: PrepareArtifacts
          displayName: 'Prepare Linux GTK4 Artifacts'
          timeoutInMinutes: 15
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: Publish Linux GTK4 Packages
              targetPath: '$(Pipeline.Workspace)/LinuxGtk4Packages'
              artifactName: LinuxGtk4PackagesForNuGet
          steps:
          - download: current
            artifact: PackageArtifacts
            displayName: Download PackageArtifacts
          - powershell: |
              New-Item -ItemType Directory -Force -Path '$(Pipeline.Workspace)/LinuxGtk4Packages'
              Copy-Item '$(Pipeline.Workspace)/PackageArtifacts/Microsoft.Maui.Platforms.Linux.Gtk4.*.nupkg' '$(Pipeline.Workspace)/LinuxGtk4Packages/' -Verbose
            displayName: Filter Linux GTK4 packages

        - job: PublishNuGet
          displayName: 'Push Linux GTK4 to NuGet.org'
          dependsOn: PrepareArtifacts
          timeoutInMinutes: 30
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
          templateContext:
            type: releaseJob
            isProduction: true
            inputs:
            - input: pipelineArtifact
              artifactName: LinuxGtk4PackagesForNuGet
              targetPath: '$(Pipeline.Workspace)/LinuxGtk4Packages'
          steps:
          - task: 1ES.PublishNuget@1
            displayName: 'Push Linux GTK4 to NuGet.org'
            inputs:
              useDotNetTask: false
              packagesToPush: '$(Pipeline.Workspace)/LinuxGtk4Packages/*.nupkg'
              packageParentPath: '$(Pipeline.Workspace)/LinuxGtk4Packages'
              nuGetFeedType: external
              publishFeedCredentials: 'nuget.org (dotnetframework)'

    # Publish WPF packages to NuGet.org
    - ${{ if eq(parameters.publishWpfNuget, true) }}:
      - stage: publish_wpf_nuget
        displayName: 'Publish WPF to NuGet.org'
        dependsOn:
        - Validate
        - publish_using_darc
        jobs:
        - job: PrepareArtifacts
          displayName: 'Prepare WPF Artifacts'
          timeoutInMinutes: 15
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: Publish WPF Packages
              targetPath: '$(Pipeline.Workspace)/WpfPackages'
              artifactName: WpfPackagesForNuGet
          steps:
          - download: current
            artifact: PackageArtifacts
            displayName: Download PackageArtifacts
          - powershell: |
              New-Item -ItemType Directory -Force -Path '$(Pipeline.Workspace)/WpfPackages'
              Copy-Item '$(Pipeline.Workspace)/PackageArtifacts/Microsoft.Maui.Platforms.Windows.WPF.*.nupkg' '$(Pipeline.Workspace)/WpfPackages/' -Verbose -ErrorAction Stop
            displayName: Filter WPF packages

        - job: PublishNuGet
          displayName: 'Push WPF to NuGet.org'
          dependsOn: PrepareArtifacts
          timeoutInMinutes: 30
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
          templateContext:
            type: releaseJob
            isProduction: true
            inputs:
            - input: pipelineArtifact
              artifactName: WpfPackagesForNuGet
              targetPath: '$(Pipeline.Workspace)/WpfPackages'
          steps:
          - task: 1ES.PublishNuget@1
            displayName: 'Push WPF to NuGet.org'
            inputs:
              useDotNetTask: false
              packagesToPush: '$(Pipeline.Workspace)/WpfPackages/*.nupkg'
              packageParentPath: '$(Pipeline.Workspace)/WpfPackages'
              nuGetFeedType: external
              publishFeedCredentials: 'nuget.org (dotnetframework)'

    # Publish EssentialsAI packages to NuGet.org
    - ${{ if eq(parameters.publishEssentialsAINuget, true) }}:
      - stage: publish_essentialsai_nuget
        displayName: 'Publish EssentialsAI to NuGet.org'
        dependsOn:
        - Validate
        - publish_using_darc
        jobs:
        - job: PrepareArtifacts
          displayName: 'Prepare EssentialsAI Artifacts'
          timeoutInMinutes: 15
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: Publish EssentialsAI Packages
              targetPath: '$(Pipeline.Workspace)/EssentialsAIPackages'
              artifactName: EssentialsAIPackagesForNuGet
          steps:
          - download: current
            artifact: PackageArtifacts
            displayName: Download PackageArtifacts
          - powershell: |
              New-Item -ItemType Directory -Force -Path '$(Pipeline.Workspace)/EssentialsAIPackages'
              Copy-Item '$(Pipeline.Workspace)/PackageArtifacts/Microsoft.Maui.Essentials.AI.*.nupkg' '$(Pipeline.Workspace)/EssentialsAIPackages/' -Verbose -ErrorAction Stop
            displayName: Filter EssentialsAI packages

        - job: PublishNuGet
          displayName: 'Push EssentialsAI to NuGet.org'
          dependsOn: PrepareArtifacts
          timeoutInMinutes: 30
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
