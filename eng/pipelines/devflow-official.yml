# Azure DevOps official build pipeline for DevFlow, Cli, and Linux GTK4.
# Uses Arcade build system with 1ES Pipeline Templates for security compliance.
# All products build in parallel; each can be published to NuGet.org independently.

trigger:
  batch: true
  branches:
    include:
    - main
    - release/*

pr: none

parameters:
- name: publishDevFlowNuget
  displayName: 'Publish DevFlow packages to NuGet.org'
  type: boolean
  default: false
- name: publishCliNuget
  displayName: 'Publish Cli packages to NuGet.org'
  type: boolean
  default: false
- name: publishAppProjectReferenceNuget
  displayName: 'Publish AppProjectReference packages to NuGet.org'
  type: boolean
  default: false
- name: publishLinuxGtk4Nuget
  displayName: 'Publish Linux GTK4 packages to NuGet.org'
  type: boolean
  default: false
- name: publishWpfNuget
  displayName: 'Publish WPF packages to NuGet.org'
  type: boolean
  default: false
- name: publishMacOSNuget
  displayName: 'Publish macOS AppKit packages to NuGet.org'
  type: boolean
  default: false
- name: publishEssentialsAINuget
  displayName: 'Publish EssentialsAI packages to NuGet.org'
  type: boolean
  default: false

variables:
- template: /eng/pipelines/common-variables.yml@self
- name: _BuildConfig
  value: Release
- name: _SignType
  value: real
- name: PostBuildSign
  value: false

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: NetCore1ESPool-Internal
      image: windows.vs2026preview.scout.amd64
      os: windows
    # Required for publishing to external feeds like nuget.org
    settings:
      networkIsolationPolicy: Permissive

    # TODO: Linux GTK4 build disabled until a dotnet-buildtools-prereqs image
    # with GTK4/WebKitGTK dev packages is available. CFS network isolation
    # blocks apt-get in containers on the internal pool.
    # See: https://github.com/dotnet/dotnet-buildtools-prereqs-docker
    # containers:
    #   ubuntu2404:
    #     image: mcr.microsoft.com/dotnet-buildtools/prereqs:ubuntu-24.04

    stages:
    - stage: build
      displayName: Build
      jobs:
      - template: /eng/common/templates-official/jobs/jobs.yml@self
        parameters:
          enableMicrobuild: true
          enablePublishBuildAssets: true
          enablePublishBuildArtifacts: true
          enablePublishTestResults: true
          testResultsFormat: xunit
          enableTelemetry: true
          jobs:
          - job: DevFlow
            displayName: DevFlow - Windows
            pool:
              name: NetCore1ESPool-Internal
              demands: ImageOverride -equals windows.vs2026preview.scout.amd64
            strategy:
              matrix:
                Release:
                  _BuildConfig: Release
                  _OfficialBuildArgs: /p:DotNetSignType=$(_SignType)
                    /p:TeamName=$(_TeamName)
                    /p:OfficialBuildId=$(BUILD.BUILDNUMBER)
            steps:
            - script: eng\common\dotnet.cmd --info
              displayName: Provision .NET SDK via Arcade
            # DevFlow packages are built on Windows, including Apple library TFMs.
            - script: .dotnet\dotnet workload install maui maui-android ios maccatalyst macos maui-tizen
              displayName: Install MAUI and Apple workloads
            - script: .dotnet\dotnet build -t:InstallAndroidDependencies -f net10.0-android -p:AndroidSdkDirectory="%ANDROID_HOME%" -p:AcceptAndroidSDKLicenses=true src\DevFlow\Microsoft.Maui.DevFlow.Agent\Microsoft.Maui.DevFlow.Agent.csproj
              displayName: Install Android SDK dependencies
            - script: eng\common\cibuild.cmd
                -configuration $(_BuildConfig)
                -prepareMachine
                -projects $(Build.SourcesDirectory)\src\DevFlow\DevFlow.slnf
                $(_OfficialBuildArgs)
                /p:PackDriverNuGet=true
              displayName: Build and Test DevFlow

          - job: Cli
            displayName: Cli - Windows
            pool:
              name: NetCore1ESPool-Internal
              demands: ImageOverride -equals windows.vs2026preview.scout.amd64
            strategy:
              matrix:
                Release:
                  _BuildConfig: Release
                  _OfficialBuildArgs: /p:DotNetSignType=$(_SignType)
                    /p:TeamName=$(_TeamName)
                    /p:OfficialBuildId=$(BUILD.BUILDNUMBER)
            steps:
            - task: UseDotNet@2
              displayName: Install .NET SDK
              inputs:
                useGlobalJson: true
            - script: eng\common\cibuild.cmd
                -configuration $(_BuildConfig)
                -prepareMachine
                -projects $(Build.SourcesDirectory)\src\Cli\Cli.slnf
                $(_OfficialBuildArgs)
              displayName: Build and Test Cli

          - job: AppProjectReference
            displayName: AppProjectReference - Windows
            pool:
              name: NetCore1ESPool-Internal
              demands: ImageOverride -equals windows.vs2026preview.scout.amd64
            strategy:
              matrix:
                Release:
                  _BuildConfig: Release
                  _OfficialBuildArgs: /p:DotNetSignType=$(_SignType)
                    /p:TeamName=$(_TeamName)
                    /p:OfficialBuildId=$(BUILD.BUILDNUMBER)
            steps:
            - task: UseDotNet@2
              displayName: Install .NET SDK
              inputs:
                useGlobalJson: true
            - script: eng\common\cibuild.cmd
                -configuration $(_BuildConfig)
                -prepareMachine
                -projects $(Build.SourcesDirectory)\src\AppProjectReference\AppProjectReference.slnf
                $(_OfficialBuildArgs)
              displayName: Build and Test AppProjectReference

          # The Linux GTK4 NuGet packages are pure managed (net10.0) assemblies
          # using GirCore for GTK/WebKit bindings, so they build and pack on Windows.
          # Running on Windows is required so MicroBuild/ESRP can sign the DLLs —
          # signing does not execute on Linux agents.
          - job: LinuxGtk4
            displayName: Linux GTK4 - Windows
            pool:
              name: NetCore1ESPool-Internal
              demands: ImageOverride -equals windows.vs2026preview.scout.amd64
            strategy:
              matrix:
                Release:
                  _BuildConfig: Release
                  _OfficialBuildArgs: /p:DotNetSignType=$(_SignType)
                    /p:TeamName=$(_TeamName)
                    /p:OfficialBuildId=$(BUILD.BUILDNUMBER)
            steps:
            - task: UseDotNet@2
              displayName: Install .NET SDK
              inputs:
                useGlobalJson: true
            - script: eng\common\cibuild.cmd
                -configuration $(_BuildConfig)
                -prepareMachine
                -projects $(Build.SourcesDirectory)\platforms\Linux.Gtk4\Linux.Gtk4.slnx
                $(_OfficialBuildArgs)
              displayName: Build and Pack Linux GTK4

          - job: EssentialsAI_macOS
            displayName: EssentialsAI - macOS (native build)
            pool:
              name: Azure Pipelines
              vmImage: macos-15
              os: macOS
            templateContext:
              outputs:
              - output: pipelineArtifact
                displayName: Publish Mac Native Artifacts
                targetPath: '$(Agent.TempDirectory)/native-binaries'
                artifactName: EssentialsAIMacNativeArtifacts
            strategy:
              matrix:
                Release:
                  _BuildConfig: Release
            steps:
            - script: |
                eng/common/dotnet.sh --info
              displayName: Provision .NET SDK via Arcade
            - script: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
              displayName: Select Xcode 26.3
            - script: .dotnet/dotnet workload install maui ios maccatalyst macos maui-tizen
              displayName: Install MAUI workloads
            - script: |
                ./eng/common/build.sh \
                  --configuration $(_BuildConfig) \
                  --restore \
                  --build \
                  --prepareMachine \
                  --ci \
                  --projects $(Build.SourcesDirectory)/src/AI/EssentialsAI.slnf
              displayName: Build EssentialsAI (macOS)
            - task: CopyFiles@2
              displayName: Copy Native Binaries
              inputs:
                SourceFolder: '$(Build.SourcesDirectory)/artifacts/bin'
                Contents: |
                  */$(_BuildConfig)/*/*.resources.zip
                TargetFolder: '$(Agent.TempDirectory)/native-binaries'

          - job: EssentialsAI
            displayName: EssentialsAI - Windows
            dependsOn: EssentialsAI_macOS
            pool:
              name: NetCore1ESPool-Internal
              demands: ImageOverride -equals windows.vs2026preview.scout.amd64
            strategy:
              matrix:
                Release:
                  _BuildConfig: Release
                  _OfficialBuildArgs: /p:DotNetSignType=$(_SignType)
                    /p:TeamName=$(_TeamName)
                    /p:OfficialBuildId=$(BUILD.BUILDNUMBER)
            steps:
            - task: DownloadPipelineArtifact@2
              displayName: Download Mac Native Binaries
              inputs:
                artifact: EssentialsAIMacNativeArtifacts
                path: '$(Build.SourcesDirectory)/artifacts/bin'
            - script: eng\common\dotnet.cmd --info
              displayName: Provision .NET SDK via Arcade
            - script: .dotnet\dotnet workload install maui maui-android macos maui-tizen
              displayName: Install MAUI workloads
            - script: .dotnet\dotnet build -t:InstallAndroidDependencies -f net10.0-android -p:AndroidSdkDirectory="%ANDROID_HOME%" -p:AcceptAndroidSDKLicenses=true src\AI\Microsoft.Maui.Essentials.AI\Microsoft.Maui.Essentials.AI.csproj
              displayName: Install Android SDK dependencies
            - script: eng\common\cibuild.cmd
                -configuration $(_BuildConfig)
                -prepareMachine
                -projects $(Build.SourcesDirectory)\src\AI\EssentialsAI.slnf
                $(_OfficialBuildArgs)
              displayName: Build and Test EssentialsAI

          # Verification-only build on real Linux to catch any platform-specific
          # build breaks. This job does NOT pack or publish artifacts — the
          # shipping NuGet packages come from the Windows LinuxGtk4 job above
          # so that MicroBuild/ESRP can sign the DLLs.
          - job: LinuxGtk4_LinuxVerify
            displayName: Linux GTK4 - Ubuntu (verify)
            pool:
              name: NetCore1ESPool-Internal
              demands: ImageOverride -equals build.ubuntu.2204.amd64
              os: linux
            templateContext:
              outputs: []
            strategy:
              matrix:
                Release:
                  _BuildConfig: Release
            steps:
            - task: UseDotNet@2
              displayName: Install .NET SDK
              inputs:
                useGlobalJson: true
            - script: |
                sudo apt-get update
                sudo apt-get install -y \
                  libgtk-4-dev \
                  libwebkitgtk-6.0-dev \
                  gobject-introspection \
                  libgirepository1.0-dev \
                  gir1.2-gtk-4.0 \
                  gir1.2-webkit-6.0 \
                  pkg-config
              displayName: Install GTK4 dependencies
            - script: |
                ./eng/common/build.sh \
                  --configuration $(_BuildConfig) \
                  --restore \
                  --build \
                  --prepareMachine \
                  --ci \
                  --projects $(Build.SourcesDirectory)/platforms/Linux.Gtk4/Linux.Gtk4.slnx \
                  /p:OfficialBuild=false
              displayName: Build Linux GTK4 (no pack)

          - job: WPF
            displayName: WPF - Windows
            pool:
              name: NetCore1ESPool-Internal
              demands: ImageOverride -equals windows.vs2026preview.scout.amd64
            strategy:
              matrix:
                Release:
                  _BuildConfig: Release
                  _OfficialBuildArgs: /p:DotNetSignType=$(_SignType)
                    /p:TeamName=$(_TeamName)
                    /p:OfficialBuildId=$(BUILD.BUILDNUMBER)
            steps:
            - script: eng\common\dotnet.cmd --info
              displayName: Provision .NET SDK via Arcade
            - script: .dotnet\dotnet workload install maui
              displayName: Install MAUI workload
            - script: eng\common\cibuild.cmd
                -configuration $(_BuildConfig)
                -prepareMachine
                -projects $(Build.SourcesDirectory)\platforms\Windows.WPF\Windows.WPF.slnx
                $(_OfficialBuildArgs)
              displayName: Build, Test and Pack WPF

          # macOS AppKit packages target net10.0-macos — must build on macOS.
          # Signing runs in the Arcade post-build stage (which validates on Windows),
          # so the macOS-built nupkgs flow through the standard artifact pipeline.
          - job: MacOS
            displayName: macOS AppKit - macOS
            pool:
              name: Azure Pipelines
              vmImage: macos-latest
            strategy:
              matrix:
                Release:
                  _BuildConfig: Release
                  _OfficialBuildArgs: /p:DotNetSignType=$(_SignType)
                    /p:TeamName=$(_TeamName)
                    /p:OfficialBuildId=$(BUILD.BUILDNUMBER)
            steps:
            - task: UseDotNet@2
              displayName: Install .NET SDK
              inputs:
                useGlobalJson: true
            - script: dotnet workload install maui macos
              displayName: Install MAUI and macOS workloads
            - script: ./eng/common/cibuild.sh
                --configuration $(_BuildConfig)
                --prepareMachine
                --projects $(Build.SourcesDirectory)/platforms/MacOS/MacOS.slnx
                $(_OfficialBuildArgs)
              displayName: Build and Pack macOS AppKit
       
    - template: /eng/common/templates-official/post-build/post-build.yml@self
      parameters:
        enableSourceLinkValidation: false
        enableSigningValidation: true
        enableNugetValidation: true

    # Publish DevFlow packages to NuGet.org
    - ${{ if eq(parameters.publishDevFlowNuget, true) }}:
      - stage: publish_devflow_nuget
        displayName: 'Publish DevFlow to NuGet.org'
        dependsOn:
        - Validate
        - publish_using_darc
        jobs:
        - job: PrepareArtifacts
          displayName: 'Prepare DevFlow Artifacts'
          timeoutInMinutes: 15
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: Publish DevFlow Packages
              targetPath: '$(Pipeline.Workspace)/DevFlowPackages'
              artifactName: DevFlowPackagesForNuGet
          steps:
          - download: current
            artifact: PackageArtifacts
            displayName: Download PackageArtifacts
          - powershell: |
              New-Item -ItemType Directory -Force -Path '$(Pipeline.Workspace)/DevFlowPackages'
              Copy-Item '$(Pipeline.Workspace)/PackageArtifacts/Microsoft.Maui.DevFlow.*.nupkg' '$(Pipeline.Workspace)/DevFlowPackages/' -Verbose
            displayName: Filter DevFlow packages

        - job: PublishNuGet
          displayName: 'Push DevFlow to NuGet.org'
          dependsOn: PrepareArtifacts
          timeoutInMinutes: 30
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
          templateContext:
            type: releaseJob
            isProduction: true
            inputs:
            - input: pipelineArtifact
              artifactName: DevFlowPackagesForNuGet
              targetPath: '$(Pipeline.Workspace)/DevFlowPackages'
          steps:
          - task: 1ES.PublishNuget@1
            displayName: 'Push DevFlow to NuGet.org'
            inputs:
              useDotNetTask: false
              packagesToPush: '$(Pipeline.Workspace)/DevFlowPackages/*.nupkg'
              packageParentPath: '$(Pipeline.Workspace)/DevFlowPackages'
              nuGetFeedType: external
              publishFeedCredentials: 'nuget.org (dotnetframework)'

    # Publish Cli packages to NuGet.org
    - ${{ if eq(parameters.publishCliNuget, true) }}:
      - stage: publish_cli_nuget
        displayName: 'Publish Cli to NuGet.org'
        dependsOn:
        - Validate
        - publish_using_darc
        jobs:
        - job: PrepareArtifacts
          displayName: 'Prepare Cli Artifacts'
          timeoutInMinutes: 15
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: Publish Cli Packages
              targetPath: '$(Pipeline.Workspace)/CliPackages'
              artifactName: CliPackagesForNuGet
          steps:
          - download: current
            artifact: PackageArtifacts
            displayName: Download PackageArtifacts
          - powershell: |
              New-Item -ItemType Directory -Force -Path '$(Pipeline.Workspace)/CliPackages'
              Copy-Item '$(Pipeline.Workspace)/PackageArtifacts/Microsoft.Maui.Cli.*.nupkg' '$(Pipeline.Workspace)/CliPackages/' -Verbose
              Copy-Item '$(Pipeline.Workspace)/PackageArtifacts/Microsoft.Maui.StartupProfiling.*.nupkg' '$(Pipeline.Workspace)/CliPackages/' -Verbose -ErrorAction Stop
            displayName: Filter Cli packages

        - job: PublishNuGet
          displayName: 'Push Cli to NuGet.org'
          dependsOn: PrepareArtifacts
          timeoutInMinutes: 30
          pool:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
          templateContext:
            type: releaseJob
            isProduction: true
            inputs:
            - input: pipelineArtifact
              artifactName: CliPackagesForNuGet
              targetPath: '$(Pipeline.Workspace)/CliPackages'
          steps:
          - task: 1ES.PublishNuget@1
            displayName: 'Push Cli to NuGet.org'
            inputs:
              useDotNetTask: false
              packagesToPush: '$(Pipeline.Workspace)/CliPackages/*.nupkg'
              packageParentPath: '$(Pipeline.Workspace)/CliPackages'
              nuGetFeedType: external
              publishFeedCredentials: 'nuget.org (dotnetframework)'

    # Publish AppProjectReference packages to NuGet.org
