# Reusable build/test/pack template for Azure DevOps pipelines.
# Called by per-product official pipelines (e.g., devflow-official.yml).

parameters:
- name: pool
  type: object
- name: macPool
  type: object
- name: buildConfig
  type: string
  default: Release
- name: solutionFilter
  type: string
- name: productName
  type: string
  # Signing parameters are scaffolding for MicroBuild integration.
  # They will be wired into signing tasks once MicroBuild plugin is
  # installed and configured in the Azure DevOps project.
- name: signType
  type: string
  default: test
- name: sign
  type: string
  default: false

jobs:
# macOS build + test
- job: build_test_macos
  displayName: Build & Test (${{ parameters.productName }} macOS)
  pool: ${{ parameters.macPool }}
  timeoutInMinutes: 60
  steps:
  - checkout: self
    fetchDepth: 1

  - task: UseDotNet@2
    displayName: Install .NET SDK
    inputs:
      useGlobalJson: true

  - task: NuGetAuthenticate@1
    displayName: Authenticate NuGet feeds

  - script: dotnet workload install maui macos
    displayName: Install MAUI workloads

  - script: dotnet restore ${{ parameters.solutionFilter }}
    displayName: Restore

  - script: dotnet build ${{ parameters.solutionFilter }} --configuration ${{ parameters.buildConfig }} --no-restore
    displayName: Build

  - script: dotnet test ${{ parameters.solutionFilter }} --configuration ${{ parameters.buildConfig }} --no-build --logger trx --results-directory $(Agent.TempDirectory)/TestResults
    displayName: Test

  - task: PublishTestResults@2
    displayName: Publish test results
    condition: always()
    inputs:
      testResultsFormat: VSTest
      testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'
      testRunTitle: '${{ parameters.productName }} macOS Tests'

# Windows build + test + pack (+ sign for official builds)
- job: build_test_pack_windows
  displayName: Build, Test & Pack (${{ parameters.productName }} Windows)
  pool: ${{ parameters.pool }}
  timeoutInMinutes: 60
  templateContext:
    outputs:
    - output: pipelineArtifact
      displayName: Publish package artifacts
      targetPath: $(Build.ArtifactStagingDirectory)/packages
      artifactName: packages-${{ parameters.productName }}
  steps:
  - checkout: self
    fetchDepth: 1

  - task: UseDotNet@2
    displayName: Install .NET SDK
    inputs:
      useGlobalJson: true

  - task: NuGetAuthenticate@1
    displayName: Authenticate NuGet feeds

  - script: dotnet workload install maui macos
    displayName: Install MAUI workloads

  - script: dotnet restore ${{ parameters.solutionFilter }}
    displayName: Restore

  - script: dotnet build ${{ parameters.solutionFilter }} --configuration ${{ parameters.buildConfig }} --no-restore
    displayName: Build

  - script: dotnet test ${{ parameters.solutionFilter }} --configuration ${{ parameters.buildConfig }} --no-build --no-restore --logger trx --results-directory $(Agent.TempDirectory)/TestResults
    displayName: Test

  - task: PublishTestResults@2
    displayName: Publish test results
    condition: always()
    inputs:
      testResultsFormat: VSTest
      testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'
      testRunTitle: '${{ parameters.productName }} Windows Tests'

  # Pack NuGet packages
  - script: >-
      dotnet pack ${{ parameters.solutionFilter }}
      --configuration ${{ parameters.buildConfig }}
      --no-build
      --output $(Build.ArtifactStagingDirectory)/packages
      /p:PackageOutputPath=$(Build.ArtifactStagingDirectory)/packages
    displayName: Pack NuGet packages
